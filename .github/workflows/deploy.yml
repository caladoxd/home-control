name: Build & Deploy (staging)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: home-control-staging
  ECS_CLUSTER: home-control-staging
  ECS_SERVICE: staging-home-control
  CONTAINER_NAME: home-control

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List build context
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in build context:"
          find . -maxdepth 2 -not -path './.git/*' | head -80
          echo "---"
          echo "Dockerfile content:"
          cat Dockerfile
          echo "---"
          if [ -f .dockerignore ]; then echo ".dockerignore:"; cat .dockerignore; fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create image tag
        id: image-tag
        run: echo "tag=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          IMAGE: ${{ format('{0}/{1}:{2}', steps.login-ecr.outputs.registry, env.ECR_REPOSITORY, steps.image-tag.outputs.tag) }}
        run: |
          docker build -t $IMAGE .
          docker push $IMAGE
          docker tag $IMAGE ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition tsk-staging-home-control \
            --query taskDefinition > task-definition.json
          echo "Task definition retrieved:"
          cat task-definition.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ format('{0}/{1}:{2}', steps.login-ecr.outputs.registry, env.ECR_REPOSITORY, steps.image-tag.outputs.tag) }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Get service details before stability check
        run: |
          echo "=== Service Details ==="
          aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --output json | jq '.services[0] | {desiredCount, runningCount, status, deployments}'
          echo "=== Task Details ==="
          aws ecs list-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service-name ${{ env.ECS_SERVICE }} \
            --output json | jq '.taskArns[]' | head -5

      - name: Check ECS service status
        run: |
          echo "Waiting for service to stabilize..."
          for i in {1..60}; do
            SERVICE_JSON=$(aws ecs describe-services \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services ${{ env.ECS_SERVICE }} \
              --output json)
            RUNNING=$(echo "$SERVICE_JSON" | jq '.services[0].runningCount')
            DESIRED=$(echo "$SERVICE_JSON" | jq '.services[0].desiredCount')
            STATUS=$(echo "$SERVICE_JSON" | jq -r '.services[0].status')
            DEPLOYMENT_COUNT=$(echo "$SERVICE_JSON" | jq '.services[0].deployments | length')
            echo "Attempt $i: Running=$RUNNING, Desired=$DESIRED, Status=$STATUS, Deployments=$DEPLOYMENT_COUNT"
            
            if [ "$RUNNING" = "$DESIRED" ] && [ "$RUNNING" -gt 0 ]; then
              echo "✓ Service stabilized successfully"
              exit 0
            fi
            
            if [ $i -eq 30 ] || [ $i -eq 60 ]; then
              echo "--- Full service state at attempt $i ---"
              aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.ECS_SERVICE }} --output json | jq '.services[0]'
              TASK_ARNS=$(aws ecs list-tasks --cluster ${{ env.ECS_CLUSTER }} --service-name ${{ env.ECS_SERVICE }} --output json | jq -r '.taskArns[]' | head -3)
              if [ ! -z "$TASK_ARNS" ]; then
                echo "--- Task details ---"
                aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARNS --output json | jq '.tasks[] | {taskArn, lastStatus, stopCode, stoppedReason}'
              fi
            fi
            sleep 10
          done
          echo "✗ Service failed to stabilize after 10 minutes"
          exit 1
